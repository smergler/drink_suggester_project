<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drink Suggester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #e2b96f; }
    form { display: grid; gap: 0.75rem; max-width: 480px; }
    label { font-size: 0.85rem; color: #aaa; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #444; border-radius: 6px; background: #16213e; color: #eee; font-size: 1rem; }
    button { padding: 0.6rem 1.4rem; background: #e2b96f; color: #1a1a2e; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #error { color: #f87171; margin-top: 1rem; font-size: 0.9rem; display: none; }
    #results { margin-top: 2rem; display: grid; gap: 1.5rem; }
    .card { background: #16213e; border: 1px solid #2d3561; border-radius: 10px; padding: 1.25rem; }
    .card h2 { font-size: 1.2rem; color: #e2b96f; margin-bottom: 0.4rem; }
    .card .why { font-size: 0.85rem; color: #aaa; margin-bottom: 0.75rem; font-style: italic; }
    .ingredients { list-style: none; margin-bottom: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .ing { font-size: 0.8rem; padding: 0.2rem 0.55rem; border-radius: 999px; }
    .ing.inventory { background: #14532d; color: #86efac; }
    .ing.pantry    { background: #1e3a5f; color: #93c5fd; }
    .ing.perishable{ background: #3b1f5e; color: #d8b4fe; }
    .ing.missing   { background: #450a0a; color: #fca5a5; }
    .steps { font-size: 0.88rem; color: #ccc; padding-left: 1.2rem; }
    .steps li { margin-bottom: 0.3rem; }
  </style>
</head>
<body>
  <h1>Drink Suggester</h1>
  <form id="form">
    <div>
      <label for="occasion">Occasion</label>
      <input id="occasion" type="text" placeholder="dinner party, movie night…" required />
    </div>
    <div>
      <label for="mood">Mood / vibe (optional)</label>
      <input id="mood" type="text" placeholder="spirit-forward, bright and citrusy…" />
    </div>
    <div>
      <label for="count">How many suggestions?</label>
      <select id="count">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
      </select>
    </div>
    <button type="submit" id="btn">Suggest</button>
  </form>
  <div id="error"></div>
  <div id="results"></div>

  <script>
    const form = document.getElementById('form');
    const btn  = document.getElementById('btn');
    const errEl = document.getElementById('error');
    const resultsEl = document.getElementById('results');

    function txt(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML; // safely escaped
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const occasion = document.getElementById('occasion').value.trim();
      if (!occasion) { errEl.textContent = 'Occasion is required.'; errEl.style.display = 'block'; return; }

      btn.disabled = true;
      btn.textContent = 'Thinking…';
      errEl.style.display = 'none';
      resultsEl.innerHTML = '';

      const body = {
        occasion,
        mood:  document.getElementById('mood').value.trim() || undefined,
        count: Number(document.getElementById('count').value),
      };

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);

      try {
        const res = await fetch('/recommend', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller.signal,
        });
        clearTimeout(timeout);
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || `HTTP ${res.status}`);
        }
        const { suggestions } = await res.json();
        resultsEl.innerHTML = suggestions.map(renderCard).join('');
      } catch (err) {
        clearTimeout(timeout);
        errEl.textContent = err.name === 'AbortError' ? 'Request timed out — try again.' : err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Suggest';
      }
    });

    function renderCard(s) {
      const ings = s.ingredients.map(i => {
        const qty = i.quantity ? ` (${txt(i.quantity)})` : '';
        return `<li class="ing ${txt(i.source || 'missing')}">${txt(i.name)}${qty}</li>`;
      }).join('');
      const steps = s.steps.length
        ? `<ol class="steps">${s.steps.map(t => `<li>${txt(t)}</li>`).join('')}</ol>`
        : '';
      return `
        <div class="card">
          <h2>${txt(s.name)}</h2>
          <p class="why">${txt(s.why || s.description)}</p>
          <ul class="ingredients">${ings}</ul>
          ${steps}
        </div>`;
    }
  </script>
</body>
</html>
